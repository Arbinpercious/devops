name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint pytest

    - name: Run linting
      run: pylint app.py --exit-zero
      continue-on-error: true

    - name: Run tests
      run: python -m unittest tests.test_app -v
      continue-on-error: true

    - name: Test application imports
      run: |
        python -c "from app import BusBookingSystem; print('✅ Application imports successfully')"

    - name: Create deployment report
      run: echo "Build successful at $(date)" > build-report.txt
      if: success()

    - name: Upload report artifact
      uses: actions/upload-artifact@v3
      with:
        name: build-report
        path: build-report.txt
      if: success()
